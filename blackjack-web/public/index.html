<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Blackjack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>♠️ Blackjack ♣️</h1>
        
        <div class="table">
            <div class="hand-section">
                <h2>Croupier (Score: <span id="dealer-score">?</span>)</h2>
                <div id="dealer-cards" class="cards-container"></div>
            </div>

            <div id="message-board" class="message hidden"></div>

            <div class="hand-section">
                <h2>Joueur (Score: <span id="player-score">0</span>)</h2>
                <div id="player-cards" class="cards-container"></div>
            </div>
        </div>

        <div class="forced-cards">
            <label for="forced-cards-input">Prochaines cartes (ordre exact) :</label>
            <input id="forced-cards-input" type="text" placeholder="Ex: AS,10C,7H" />
            <div class="hint">Format: lettres (A, 2-10, J, Q, K) + suit (S/H/D/C). Séparées par des virgules.</div>
        </div>

        <div class="controls">
            <button id="btn-hit" disabled>Tirer (Hit)</button>
            <button id="btn-stand" disabled>Rester (Stand)</button>
            <button id="btn-new-game">Nouvelle Partie</button>
            <button id="btn-save-forced" type="button">Sauvegarder mes choix</button>

        </div>
    </div>


    <script src="app.js"></script>
</body>
</html>
